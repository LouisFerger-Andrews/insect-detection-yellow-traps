name: CI

on:
  push:
    branches: ["main", "Development", "developer"]
  pull_request:
    branches: ["main", "Development", "developer"]

permissions:
  contents: write

jobs:
  quality-and-build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: "npm"
          cache-dependency-path: 03_application/frontend/package-lock.json

      - name: Backend compile checks
        run: python -m compileall 03_application/backend/app 04_modeling_experimental/src

      - name: Frontend build checks
        working-directory: 03_application/frontend
        run: |
          npm ci
          npm run build
      - name: Frontend tests
        id: frontend_tests
        continue-on-error: true
        working-directory: 03_application/frontend
        run: npm test

      - name: Backend tests
        id: backend_tests
        continue-on-error: true
        run: |
          python -m pip install -r 03_application/backend/requirements.txt
          python -m pytest -q 03_application/tests/backend

      - name: Build backend container
        id: backend_build
        continue-on-error: true
        run: docker build -t swd-monitoring-backend:ci 03_application/backend

      - name: Build frontend container
        id: frontend_build
        continue-on-error: true
        run: docker build -t swd-monitoring-frontend:ci 03_application/frontend

      - name: Append quality/deployment snapshot
        if: ${{ github.event_name == 'push' && github.ref_name == 'developer' }}
        run: |
          python scripts/append_ci_snapshot.py \
            --sha "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}" \
            --run-id "${GITHUB_RUN_ID}" \
            --backend-tests "${{ steps.backend_tests.outcome }}" \
            --frontend-tests "${{ steps.frontend_tests.outcome }}" \
            --backend-build "${{ steps.backend_build.outcome }}" \
            --frontend-build "${{ steps.frontend_build.outcome }}"

      - name: Commit snapshot
        if: ${{ github.event_name == 'push' && github.ref_name == 'developer' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 02_pm_analytics_dashboard/quality_history.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(ci): append quality/deployment snapshot [skip ci]"
            git push
          fi

      - name: Fail job if checks failed
        if: ${{ steps.backend_tests.outcome == 'failure' || steps.frontend_tests.outcome == 'failure' || steps.backend_build.outcome == 'failure' || steps.frontend_build.outcome == 'failure' }}
        run: exit 1
